<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>권혜영 워크스페이스</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg:#F5F6F8; --surface:#FFFFFF;
    --navy:#131A2B; --navy-2:#1D2740;
    --ink:#191F28; --muted:#6B7684; --faint:#9AA3B2; --line:#E5E8EB;
    --orange:#FC9600; --orange-tint:#FFF1DD; --orange-deep:#D67D00;
    --teal:#0EA5A5; --teal-tint:#E4F7F7;
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Pretendard', -apple-system, sans-serif; background:var(--bg); color:var(--ink); line-height:1.55; -webkit-font-smoothing:antialiased; padding-bottom:60px;}
  .wrap{max-width:1600px; margin:0 auto; padding:0 40px;}

  /* login screen */
  #login-screen{
    position:fixed; inset:0; background:linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
    display:flex; align-items:center; justify-content:center; z-index:100;
  }
  .login-card{background:var(--surface); border-radius:16px; padding:36px 32px; width:100%; max-width:360px;}
  .login-card h2{font-size:18px; font-weight:800; margin-bottom:4px;}
  .login-card p{font-size:12.5px; color:var(--muted); margin-bottom:22px;}
  .login-card input{
    width:100%; font-family:inherit; font-size:13.5px; border:1px solid var(--line); border-radius:8px;
    padding:11px 13px; margin-bottom:10px; color:var(--ink); background:var(--bg);
  }
  .login-card input:focus{outline:none; border-color:var(--orange);}
  .login-card button{
    width:100%; background:var(--navy); color:#fff; border:none; border-radius:8px; padding:12px;
    font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:6px;
  }
  .login-card button:disabled{background:var(--faint); cursor:default;}
  .login-error{color:#E5484D; font-size:12px; margin-top:10px; min-height:16px;}
  #app-root{display:none;}
  .logout-btn{
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); color:rgba(255,255,255,.8);
    font-size:11.5px; font-weight:600; padding:6px 12px; border-radius:20px; cursor:pointer; font-family:inherit;
  }

  .hero{background:linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%); color:#fff; padding:40px 0 30px;}
  .hero-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .eyebrow{font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--orange); margin-bottom:10px;}
  .hero h1{font-size:24px; font-weight:800; letter-spacing:-0.02em;}
  .os-tag{margin-top:6px; font-size:12px; font-weight:600; color:var(--orange);}
  .hero p.sub{margin-top:8px; font-size:13.5px; color:rgba(255,255,255,.6); max-width:480px;}

  .goal-badge{
    margin-top:18px; display:inline-flex; align-items:center; gap:10px;
    background:rgba(252,150,0,.1); border:1px solid rgba(252,150,0,.35); border-radius:12px;
    padding:12px 16px;
  }
  .goal-badge .g-label{font-size:10px; font-weight:800; letter-spacing:.1em; color:var(--orange); flex:none;}
  .goal-badge .g-text{font-size:13.5px; font-weight:700; color:#fff; line-height:1.5;}
  .goal-badge .g-text .strike{color:rgba(255,255,255,.4); font-weight:500; text-decoration:line-through; margin-right:5px;}

  .stat-row{display:flex; gap:10px; margin-top:24px; flex-wrap:wrap;}
  .stat{background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:12px 16px; flex:1; min-width:120px;}
  .stat .v{font-size:20px; font-weight:800;}
  .stat .v span{font-size:12px; font-weight:600; color:rgba(255,255,255,.5);}
  .stat .l{font-size:11px; color:rgba(255,255,255,.5); margin-top:2px;}
  .stat .v.pos{color:var(--orange);}

  /* ---------- workspace layout (sidebar + panel) ---------- */
  .workspace{display:flex; gap:22px; align-items:flex-start; padding-top:28px;}
  .sidebar{width:236px; flex:none; display:flex; flex-direction:column; gap:5px; position:sticky; top:16px;}
  .sidebar-label{font-size:10.5px; font-weight:800; color:var(--faint); letter-spacing:.08em; text-transform:uppercase; margin:4px 0 4px 4px;}
  .side-item{
    display:flex; align-items:center; gap:9px; padding:10px 11px; border-radius:10px; cursor:pointer;
    border:1px solid transparent; background:transparent;
  }
  .side-item:hover{background:#EEF0F3;}
  .side-item.active{border-color:currentColor;}
  .side-icon{font-size:15px; flex:none; width:18px; text-align:center;}
  .side-label{flex:1; font-size:13px; font-weight:700; color:var(--ink); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .side-count{font-size:11px; font-weight:700; color:var(--muted); background:#fff; border-radius:20px; padding:2px 8px; flex:none;}
  .side-divider{height:1px; background:var(--line); margin:10px 6px;}

  .panel{flex:1; min-width:0;}
  .panel-header{margin-bottom:16px;}
  .panel-breadcrumb{font-size:11px; font-weight:700; color:var(--faint); margin-bottom:6px;}
  .panel-title{display:flex; align-items:center; gap:9px; font-size:19px; font-weight:800; letter-spacing:-0.01em;}
  .panel-desc{font-size:12.5px; color:var(--muted); margin-top:7px; max-width:600px;}
  .panel-meta{font-size:11.5px; color:var(--faint); margin-top:9px;}

  .quick-add-bar{
    border:1.5px dashed var(--line); border-radius:10px; padding:13px 14px; margin-bottom:8px; background:var(--surface);
    display:flex; align-items:center; gap:8px;
  }
  .quick-add-bar input{border:none; background:transparent; font-size:13.5px; width:100%; font-family:inherit; color:var(--ink);}
  .quick-add-bar input:focus{outline:none;}
  .quick-add-bar input::placeholder{color:var(--faint); font-weight:600;}
  .quick-add-btn{
    flex:none; background:var(--navy); color:#fff; border:none; border-radius:7px; padding:7px 14px;
    font-size:12px; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .quick-add-btn:disabled{background:var(--faint); cursor:default;}

  .phase-pills{display:flex; gap:6px; margin-bottom:8px;}
  .phase-pill{
    font-size:12px; font-weight:700; padding:7px 14px; border-radius:20px; cursor:pointer;
    border:1px solid var(--line); background:var(--bg); color:var(--muted);
  }
  .phase-pill.active[data-phase="study"]{background:#EAF1FF; border-color:#2F6FED; color:#2F6FED;}
  .phase-pill.active[data-phase="ops"]{background:var(--orange-tint); border-color:var(--orange); color:var(--orange-deep);}

  .phase-filter{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
  .phase-filter-pill{
    font-size:12px; font-weight:700; padding:7px 13px; border-radius:20px; cursor:pointer;
    border:1px solid var(--line); background:var(--surface); color:var(--muted);
  }
  .phase-filter-pill.active{background:var(--navy); border-color:var(--navy); color:#fff;}

  .entry-phase-tag{font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px;}
  .entry-phase-tag.study{background:#EAF1FF; color:#2F6FED;}
  .entry-phase-tag.ops{background:var(--orange-tint); color:var(--orange-deep);}

  .record-list{margin-top:6px;}
  .empty-state{text-align:center; padding:40px 10px; color:var(--faint); font-size:13px;}

  /* ---------- shared card/composer bits ---------- */
  .composer{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:20px; margin-bottom:14px;}
  .composer input[type="text"], .composer textarea{
    width:100%; font-family:inherit; font-size:13.5px; border:1px solid var(--line); border-radius:8px;
    padding:10px 12px; color:var(--ink); background:var(--bg); resize:vertical; margin-bottom:8px;
  }
  .composer input:focus, .composer textarea:focus{outline:none; border-color:var(--orange);}
  .composer input[type="text"].metric-input{border-color:var(--orange); background:var(--orange-tint);}
  .composer-submit{
    background:var(--navy); color:#fff; border:none; border-radius:8px; padding:9px 18px;
    font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit; float:right;
  }
  .composer::after{content:''; display:table; clear:both;}

  .checkin-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px 16px; margin-bottom:10px;}
  @media (max-width:520px){.checkin-grid{grid-template-columns:1fr;}}
  .checkin-item .ci-label{display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;}
  .checkin-item .ci-label b{font-weight:700; display:inline-flex; align-items:center; gap:6px;}
  .checkin-item .ci-label span{font-weight:700;}
  .checkin-item input[type="range"]{width:100%;}
  .ci-dot{width:7px; height:7px; border-radius:50%; flex:none;}

  /* outcome (decision -> result) */
  .outcome-toggle{
    margin-top:8px; font-size:11.5px; font-weight:700; color:var(--muted); background:var(--bg);
    border:1px dashed var(--line); border-radius:8px; padding:7px 12px; cursor:pointer;
  }
  .outcome-form{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);}
  .outcome-result-row{display:flex; gap:6px; margin-bottom:8px;}
  .outcome-result-row select{
    font-family:inherit; font-size:12px; border:1px solid var(--line); border-radius:8px;
    padding:6px 10px; background:var(--surface); color:var(--ink);
  }
  .outcome-input{width:100%; font-family:inherit; font-size:12.5px; border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin-bottom:8px; resize:vertical; background:var(--bg);}
  .outcome-save{background:var(--navy); color:#fff; border:none; border-radius:7px; padding:6px 14px; font-size:11.5px; font-weight:700; cursor:pointer; font-family:inherit;}
  .outcome-cancel{background:none; border:none; color:var(--faint); font-size:11.5px; cursor:pointer; font-family:inherit; margin-left:6px;}
  .outcome-block{margin-top:10px; padding:10px 12px; border-radius:8px;}
  .outcome-block.positive{background:#EAF7EF;}
  .outcome-block.neutral{background:#F2F3F5;}
  .outcome-block.negative{background:#FDECEC;}
  .outcome-tag{font-size:10px; font-weight:800; letter-spacing:.02em;}
  .outcome-block.positive .outcome-tag{color:#1B8A4A;}
  .outcome-block.neutral .outcome-tag{color:var(--muted);}
  .outcome-block.negative .outcome-tag{color:#C22C31;}
  .outcome-date{font-size:10.5px; color:var(--faint); margin-left:8px;}
  .outcome-text{font-size:12.5px; color:var(--ink); margin-top:4px; white-space:pre-wrap;}

  .entry-metric{
    display:inline-block; margin-top:6px; font-size:11.5px; font-weight:700; color:var(--orange-deep);
    background:var(--orange-tint); border-radius:6px; padding:4px 10px;
  }

  /* attachments */
  .attach-input-btn{
    display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:var(--muted);
    background:var(--bg); border:1px dashed var(--line); border-radius:8px; padding:7px 12px; cursor:pointer; margin-bottom:8px;
  }
  .attach-input-btn:hover{border-color:var(--orange); color:var(--orange-deep);}
  .attach-staged{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;}
  .attach-staged-chip{
    display:inline-flex; align-items:center; gap:6px; font-size:11px; background:var(--orange-tint); color:var(--orange-deep);
    border-radius:20px; padding:4px 8px 4px 10px;
  }
  .attach-staged-chip .rm{cursor:pointer; font-weight:800; opacity:.7;}
  .attach-progress{font-size:11.5px; color:var(--faint); margin-bottom:8px;}

  .entry-attachments{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .attach-thumb{width:64px; height:64px; border-radius:8px; object-fit:cover; border:1px solid var(--line); cursor:pointer;}
  .attach-file-chip{
    display:flex; align-items:center; gap:8px; font-size:11.5px; background:var(--bg); border:1px solid var(--line);
    border-radius:8px; padding:8px 10px; max-width:220px;
  }
  .attach-file-chip .af-icon{font-size:16px; flex:none;}
  .attach-file-chip .af-name{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; color:var(--ink);}
  .attach-file-chip .af-size{font-size:10px; color:var(--faint);}
  .attach-file-chip .af-dl{color:var(--orange-deep); font-weight:800; cursor:pointer; flex:none;}
  .attach-del{position:relative; margin-left:-6px;}
  .attach-del-btn{
    position:absolute; top:-6px; right:-6px; width:16px; height:16px; border-radius:50%; background:var(--navy);
    color:#fff; font-size:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none;
  }
  .entry-attach-add{margin-top:8px; font-size:11px; font-weight:700; color:var(--faint); background:none; border:1px dashed var(--line); border-radius:7px; padding:5px 10px; cursor:pointer; font-family:inherit;}

  .entry{background:var(--surface); border:1px solid var(--line); border-left:4px solid var(--faint); border-radius:10px; padding:16px 18px; margin-bottom:10px; position:relative;}
  .entry-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:4px;}
  .entry-meta{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .entry-tag{font-size:10px; font-weight:800; letter-spacing:.03em; padding:2px 8px; border-radius:20px;}
  .entry-tag.journal, .entry-tag.milestone, .entry-tag.decision{background:#EEF0F3; color:var(--muted);}
  .entry-tag.checkin{background:var(--teal-tint); color:var(--teal);}
  .entry-example-tag{font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; background:#EEF0F3; color:var(--faint);}
  .entry-dom-tag{font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; background:#fff;}
  .entry-date{font-size:11px; color:var(--faint); font-weight:600;}
  .entry-del{background:none; border:none; color:var(--faint); font-size:16px; cursor:pointer; line-height:1;}
  .entry-edit{background:none; border:none; color:var(--faint); font-size:13px; cursor:pointer; margin-right:8px;}
  .entry-edit:hover{color:var(--orange-deep);}
  .edit-title-input{
    width:100%; font-family:inherit; font-size:14px; font-weight:700; border:1px solid var(--orange); border-radius:8px;
    padding:8px 10px; color:var(--ink); background:var(--orange-tint); margin-bottom:6px;
  }
  .edit-content-input{
    width:100%; font-family:inherit; font-size:12.8px; border:1px solid var(--line); border-radius:8px;
    padding:8px 10px; color:var(--ink); background:var(--bg); resize:vertical; margin-bottom:6px;
  }
  .edit-title-input:focus, .edit-content-input:focus{outline:none; border-color:var(--orange);}
  .edit-save{background:var(--navy); color:#fff; border:none; border-radius:7px; padding:6px 14px; font-size:11.5px; font-weight:700; cursor:pointer; font-family:inherit;}
  .edit-cancel{background:none; border:none; color:var(--faint); font-size:11.5px; cursor:pointer; font-family:inherit; margin-left:6px;}
  .entry-title{font-size:14px; font-weight:700; margin-bottom:4px;}
  .entry-content{font-size:12.8px; color:var(--muted); white-space:pre-wrap;}
  .entry-scores{display:flex; gap:10px; flex-wrap:wrap; margin-top:6px;}
  .es{font-size:11px; color:var(--muted); background:var(--bg); border-radius:6px; padding:4px 8px;}
  .es b{color:var(--ink);}

  /* growth chart / snapshot (checkin view) */
  .chart-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:20px; margin-bottom:14px;}
  .chart-empty{text-align:center; padding:26px 10px; color:var(--faint); font-size:13px;}
  .chart-empty b{color:var(--muted); display:block; margin-bottom:4px; font-size:13.5px;}
  #chart-svg{width:100%; height:auto; display:block;}
  .chart-legend{display:flex; gap:14px; margin-top:10px; padding-top:10px; border-top:1px solid var(--line); font-size:11px; color:var(--muted); flex-wrap:wrap;}
  .chart-legend span{display:inline-flex; align-items:center; gap:5px;}
  .leg-dot{width:7px; height:7px; border-radius:50%;}

  .snap-row{margin-bottom:12px;}
  .snap-row:last-child{margin-bottom:0;}
  .snap-top{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px;}
  .snap-top b{font-weight:700;}
  .snap-track{height:7px; background:#EEF0F3; border-radius:4px; overflow:hidden;}
  .snap-fill{height:100%; border-radius:4px;}
  .snap-row.weak{background:#FDECEC; margin:0 -12px 12px; padding:8px 12px; border-radius:8px;}
  .weak-tag{font-size:10px; font-weight:800; color:#C22C31; background:#fff; border-radius:20px; padding:1px 7px; margin-left:6px;}

  @media (max-width:760px){
    .workspace{flex-direction:column;}
    .sidebar{width:100%; position:static; flex-direction:row; flex-wrap:wrap;}
    .side-item{flex:none;}
    .side-divider{display:none;}
  }

  footer{max-width:1600px; margin:30px auto 0; padding:18px 40px 0; border-top:1px solid var(--line); font-size:11px; color:var(--faint); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;}
  #reset-all{background:none; border:none; color:var(--faint); font-size:11px; text-decoration:underline; cursor:pointer; font-family:inherit;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2>권혜영 워크스페이스</h2>
    <p>본인 계정으로만 접근 가능합니다.</p>
    <form id="login-form">
      <input type="email" id="login-email" placeholder="이메일" autocomplete="username" required>
      <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password" required>
      <button type="submit" id="login-submit">로그인</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<div id="app-root">

<div class="hero">
  <div class="wrap">
    <div class="hero-top">
      <div>
        <div class="eyebrow">Career Journey Log</div>
        <h1>권혜영 워크스페이스</h1>
        <p class="os-tag">경영자가 되기 위한 개인 운영체계(OS)</p>
      </div>
      <button class="logout-btn" id="logout-btn">로그아웃</button>
    </div>
    <p class="sub">브랜드팀장에서 경영자로 — 공부·역량확장·운영여정을 기록하고, 성장을 데이터화한다.</p>
    <div class="goal-badge">
      <span class="g-label">GOAL</span>
      <span class="g-text"><span class="strike">브랜드를 만드는 사람</span>을 넘어, 브랜드를 지속적으로 성장시키는 경영자</span>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="v" id="stat-total">0</div><div class="l">총 기록</div></div>
      <div class="stat"><div class="v" id="stat-days">0<span>일</span></div><div class="l">기록 시작 후</div></div>
      <div class="stat"><div class="v" id="stat-checkins">0</div><div class="l">역량 체크인 횟수</div></div>
      <div class="stat"><div class="v pos" id="stat-growth">–</div><div class="l">첫 체크인 대비 성장</div></div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="workspace">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="panel" id="panel"></main>
  </div>
</div>

<footer>
  <span>권혜영 워크스페이스 · Firebase 저장 · 본인 계정으로만 접근 가능</span>
  <span>
    <button id="load-example" style="background:none; border:none; color:var(--orange-deep); font-size:11px; text-decoration:underline; cursor:pointer; font-family:inherit; margin-right:14px;">예시로 채워보기</button>
    <button id="clear-example" style="background:none; border:none; color:var(--faint); font-size:11px; text-decoration:underline; cursor:pointer; font-family:inherit; margin-right:14px;">예시만 지우기</button>
    <button id="reset-all">전체 초기화</button>
  </span>
</footer>

</div>

<script type="module">
/* ===================== FIREBASE ===================== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import { getStorage, ref, uploadString, getDownloadURL, deleteObject, listAll } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyD1e1RuI7PGWWahCeyxJ_rny4LKf18mLn8",

async function loadAttachmentCache(){
  try{
    const folderRef = ref(storageInst, `attachments/${auth.currentUser.uid}`);
    const res = await listAll(folderRef);
    for(const item of res.items){
      try{ attachmentCache[item.name] = await getDownloadURL(item); }catch(e){}
    }
  }catch(e){ /* 폴더가 아직 없으면 여기로 옴 - 정상 */ }
}
async function uploadAttachment(id, dataUrl){
  const r = ref(storageInst, attachmentPath(id));
  await uploadString(r, dataUrl, 'data_url');
  const url = await getDownloadURL(r);
  attachmentCache[id] = url;
  return url;
}
async function deleteAttachmentFile(id){
  try{ await deleteObject(ref(storageInst, attachmentPath(id))); }catch(e){}
  delete attachmentCache[id];
}

/* ===================== UTIL ===================== */
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function formatSize(bytes){
  if(bytes < 1024) return bytes + 'B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(0) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}
function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escapeHtmlAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function avgScore(scores){
  const vals = CATEGORIES.map(c=>scores[c.id]).filter(v=>typeof v === 'number');
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}
async function triggerDownload(url, filename){
  try{
    const res = await fetch(url);
    const blob = await res.blob();
    const objUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = objUrl; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(objUrl);
  }catch(e){ window.open(url, '_blank'); }
}
function readFileAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('read failed'));
    r.readAsDataURL(file);
  });
}
async function compressImageIfNeeded(file, dataUrl){
  if(!file.type.startsWith('image/')) return dataUrl;
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = () => {
      let {width, height} = img;
      if(width <= MAX_IMAGE_DIM && height <= MAX_IMAGE_DIM && file.size < 1.5*1024*1024){ resolve(dataUrl); return; }
      const scale = Math.min(1, MAX_IMAGE_DIM / Math.max(width, height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(width*scale); canvas.height = Math.round(height*scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

/* ===================== ENTRY CARD (shared) ===================== */
function buildEntryCardHtml(e, opts){
  opts = opts || {};
  const isEditing = editingEntries.has(e.id);
  let body = '';
  if(e.type==='checkin' && e.scores){
    body = `<div class="entry-scores">${CATEGORIES.map(c=>`<span class="es">${c.short} <b style="color:${c.color}">${e.scores[c.id]}</b></span>`).join('')}</div>`
         + (!isEditing && e.content ? `<div class="entry-content" style="margin-top:6px;">${escapeHtml(e.content)}</div>` : '');
  } else {
    body = (!isEditing && e.content) ? `<div class="entry-content">${escapeHtml(e.content)}</div>` : '';
  }
  if(e.metric){
    body += `<div class="entry-metric">📈 ${escapeHtml(e.metric)}</div>`;
  }
  if(e.type !== 'checkin'){
    if(e.outcome){
      const OL = {positive:'👍 긍정적 결과', neutral:'➖ 중립적 결과', negative:'👎 부정적 결과'};
      body += `<div class="outcome-block ${e.outcome.result}">
        <span class="outcome-tag">${OL[e.outcome.result]}</span><span class="outcome-date">${e.outcome.date}</span>
        <div class="outcome-text">${escapeHtml(e.outcome.text)}</div>
      </div>`;
    } else if(outcomeEditing.has(e.id)){
      body += `<div class="outcome-form">
        <div class="outcome-result-row">
          <select class="outcome-result-select" data-id="${e.id}">
            <option value="positive">👍 긍정적</option>
            <option value="neutral" selected>➖ 중립</option>
            <option value="negative">👎 부정적</option>
          </select>
        </div>
        <textarea class="outcome-input" data-id="${e.id}" rows="4" placeholder="실제로 어떤 결과가 나왔나요?"></textarea>
        <button class="outcome-save" data-id="${e.id}">결과 저장</button><button class="outcome-cancel" data-id="${e.id}">취소</button>
      </div>`;
    } else {
      body += `<button class="outcome-toggle" data-id="${e.id}">+ 결과 기록하기</button>`;
    }
  }
  if(e.attachments && e.attachments.length){
    body += `<div class="entry-attachments">` + e.attachments.map(a=>{
      const dataUrl = attachmentCache[a.id];
      if(a.type && a.type.startsWith('image/')){
        return `<span class="attach-del">
          <img class="attach-thumb" src="${dataUrl || ''}" data-dl="${a.id}" data-name="${escapeHtmlAttr(a.name)}" title="${escapeHtmlAttr(a.name)} · ${formatSize(a.size)} (클릭하여 다운로드)">
          <button class="attach-del-btn" data-entry="${e.id}" data-att="${a.id}">×</button>
        </span>`;
      }
      return `<span class="attach-del">
        <span class="attach-file-chip">
          <span class="af-icon">📄</span>
          <span><span class="af-name">${escapeHtmlAttr(a.name)}</span><br><span class="af-size">${formatSize(a.size)}</span></span>
          <span class="af-dl" data-dl="${a.id}" data-name="${escapeHtmlAttr(a.name)}">↓</span>
        </span>
        <button class="attach-del-btn" data-entry="${e.id}" data-att="${a.id}">×</button>
      </span>`;
    }).join('') + `</div>`;
  }
  if(e.type !== 'checkin'){
    body += `<button class="entry-attach-add" data-entry="${e.id}">📎 + 첨부 추가</button><input type="file" class="entry-file-input" data-entry="${e.id}" multiple accept="image/*,.pdf,.doc,.docx,.xlsx,.pptx,.txt" style="display:none;">`;
  }
  const dom = (opts.showDomainTag && e.domain) ? DOM_MAP[e.domain] : null;
  const domTag = dom ? `<span class="entry-dom-tag" style="border:1px solid ${dom.color}; color:${dom.color}">${dom.icon} ${dom.short}</span>` : '';
  const phaseTag = e.type!=='checkin' ? `<span class="entry-phase-tag ${e.phase||'study'}">${(e.phase||'study')==='ops' ? '🛠 운영여정·결과' : '📖 공부·역량확장'}</span>` : '';
  const exTag = e.isExample ? `<span class="entry-example-tag">예시</span>` : '';
  let borderColor = 'var(--faint)';
  if(e.type==='checkin') borderColor = 'var(--teal)';
  else if(e.outcome) borderColor = 'var(--navy)';
  else if(e.metric) borderColor = 'var(--orange)';
  return `<div class="entry" data-type="${e.type}" style="border-left-color:${borderColor}">
    <div class="entry-top">
      <div class="entry-meta">
        <span class="entry-tag ${e.type}">${TYPE_LABEL[e.type]}</span>
        ${phaseTag}
        ${domTag}
        ${exTag}
        <span class="entry-date">${e.date}</span>
      </div>
      <div>
        <button class="entry-edit" data-id="${e.id}" title="수정">✎</button>
        <button class="entry-del" data-id="${e.id}">×</button>
      </div>
    </div>
    ${isEditing ? `
      <input type="text" class="edit-title-input" data-id="${e.id}" value="${escapeHtmlAttr(e.title)}">
      <textarea class="edit-content-input" data-id="${e.id}" rows="5" placeholder="내용">${escapeHtml(e.content || '')}</textarea>
      <button class="edit-save" data-id="${e.id}">저장</button><button class="edit-cancel" data-id="${e.id}">취소</button>
    ` : `<div class="entry-title">${escapeHtml(e.title)}</div>`}
    ${body}
  </div>`;
}

function wireCardHandlers(scope){
  scope.querySelectorAll('.entry-del').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.id;
      const entry = entries.find(e=>e.id===id);
      if(entry && entry.attachments){
        for(const a of entry.attachments) await deleteAttachmentFile(a.id);
      }
      entries = entries.filter(e => e.id !== id);
      await saveEntries();
      renderStats();
      renderSidebar();
      renderPanel();
    });
  });
  scope.querySelectorAll('.entry-edit').forEach(btn=>{
    btn.addEventListener('click', ()=>{ editingEntries.add(btn.dataset.id); renderPanel(); });
  });
  scope.querySelectorAll('.edit-cancel').forEach(btn=>{
    btn.addEventListener('click', ()=>{ editingEntries.delete(btn.dataset.id); renderPanel(); });
  });
  scope.querySelectorAll('.edit-save').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.id;
      const titleEl = scope.querySelector(`.edit-title-input[data-id="${id}"]`);
      const contentEl = scope.querySelector(`.edit-content-input[data-id="${id}"]`);
      const newTitle = titleEl.value.trim();
      if(!newTitle){ titleEl.focus(); return; }
      const entry = entries.find(e=>e.id===id);
      entry.title = newTitle;
      entry.content = contentEl.value.trim();
      editingEntries.delete(id);
      await saveEntries();
      renderSidebar();
      renderPanel();
    });
  });
  scope.querySelectorAll('.outcome-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{ outcomeEditing.add(btn.dataset.id); renderPanel(); });
  });
  scope.querySelectorAll('.outcome-cancel').forEach(btn=>{
    btn.addEventListener('click', ()=>{ outcomeEditing.delete(btn.dataset.id); renderPanel(); });
  });
  scope.querySelectorAll('.outcome-save').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.id;
      const textEl = scope.querySelector(`.outcome-input[data-id="${id}"]`);
      const selectEl = scope.querySelector(`.outcome-result-select[data-id="${id}"]`);
      const text = textEl.value.trim();
      if(!text){ textEl.focus(); return; }
      const entry = entries.find(e=>e.id===id);
      entry.outcome = {date:todayStr(), text, result:selectEl.value};
      outcomeEditing.delete(id);
      await saveEntries();
      renderPanel();
    });
  });
  scope.querySelectorAll('.attach-thumb, .af-dl').forEach(node=>{
    node.addEventListener('click', async ()=>{
      const url = attachmentCache[node.dataset.dl];
      if(url) await triggerDownload(url, node.dataset.name);
      else alert('파일을 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
    });
  });
  scope.querySelectorAll('.attach-del-btn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const entryId = btn.dataset.entry;
      const attId = btn.dataset.att;
      const entry = entries.find(x=>x.id===entryId);
      if(entry && entry.attachments) entry.attachments = entry.attachments.filter(a=>a.id !== attId);
      await deleteAttachmentFile(attId);
      await saveEntries();
      renderPanel();
    });
  });
  scope.querySelectorAll('.entry-attach-add').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      scope.querySelector(`.entry-file-input[data-entry="${btn.dataset.entry}"]`).click();
    });
  });
  scope.querySelectorAll('.entry-file-input').forEach(input=>{
    input.addEventListener('change', async (ev)=>{
      const entryId = input.dataset.entry;
      const entry = entries.find(x=>x.id===entryId);
      if(!entry) return;
      if(!entry.attachments) entry.attachments = [];
      for(const file of Array.from(ev.target.files)){
        if(file.size > MAX_FILE_BYTES){ alert(`"${file.name}" 파일이 너무 큽니다 (4MB 이하만 첨부 가능).`); continue; }
        try{
          let dataUrl = await readFileAsDataURL(file);
          dataUrl = await compressImageIfNeeded(file, dataUrl);
          const id = newId();
          await uploadAttachment(id, dataUrl);
          entry.attachments.push({id, name:file.name, type:file.type, size:dataUrl.length});
        }catch(e){ alert(`"${file.name}" 처리 중 오류가 발생했습니다.`); }
      }
      ev.target.value = '';
      await saveEntries();
      renderPanel();
    });
  });
}

/* ===================== RECORD PANEL WIRING ===================== */
function wireRecordPanel(){
  const panel = document.getElementById('panel');
  wireCardHandlers(panel);

  const quickInput = document.getElementById('quick-add-input');

  panel.querySelectorAll('.phase-pill').forEach(pill=>{
    pill.addEventListener('click', ()=>{
      selectedPhase = pill.dataset.phase;
      panel.querySelectorAll('.phase-pill').forEach(p=>p.classList.remove('active'));
      pill.classList.add('active');
    });
  });

  panel.querySelectorAll('.phase-filter-pill').forEach(pill=>{
    pill.addEventListener('click', ()=>{
      phaseFilter = pill.dataset.pf;
      renderPanel();
    });
  });

  document.getElementById('file-input').addEventListener('change', (e)=>{
    if(e.target.files.length) handleFilesStaged(e.target.files);
    e.target.value = '';
  });
  renderStagedFiles();

  async function submitEntry(){
    const title = quickInput.value.trim();
    if(!title){ quickInput.focus(); return; }
    const contentEl = document.getElementById('entry-content');
    const metricEl = document.getElementById('milestone-metric');
    const domain = currentView === 'all' ? null : currentView;
    const newEntry = {id:newId(), date:todayStr(), ts:Date.now(), type:'journal', title, content:contentEl.value.trim(), domain, phase:selectedPhase};
    if(metricEl.value.trim()) newEntry.metric = metricEl.value.trim();
    if(stagedFiles.length){
      newEntry.attachments = [];
      for(const f of stagedFiles){
        try{
          await uploadAttachment(f.id, f.dataUrl);
          newEntry.attachments.push({id:f.id, name:f.name, type:f.type, size:f.size});
        }catch(e){ console.error('attachment save failed', e); }
      }
    }
    entries.push(newEntry);
    stagedFiles = [];
    selectedPhase = 'study';
    await saveEntries();
    renderStats();
    renderSidebar();
    renderPanel();
  }

  quickInput.addEventListener('keydown', (ev)=>{
    // 한글 입력(IME) 조합 중에는 Enter가 조합 확정으로도 쓰이므로, 조합 중 Enter는 무시한다
    if(ev.key !== 'Enter' || ev.isComposing || ev.keyCode === 229) return;
    submitEntry();
  });
  document.getElementById('quick-add-btn').addEventListener('click', submitEntry);
}

async function handleFilesStaged(fileList){
  const progressEl = document.getElementById('attach-progress');
  progressEl.style.display = 'block';
  for(const file of Array.from(fileList)){
    if(file.size > MAX_FILE_BYTES){ alert(`"${file.name}" 파일이 너무 큽니다 (4MB 이하만 첨부 가능).`); continue; }
    progressEl.textContent = `"${file.name}" 처리 중...`;
    try{
      let dataUrl = await readFileAsDataURL(file);
      dataUrl = await compressImageIfNeeded(file, dataUrl);
      const id = newId();
      stagedFiles.push({id, name:file.name, type:file.type, size: dataUrl.length, dataUrl});
    }catch(e){ alert(`"${file.name}" 처리 중 오류가 발생했습니다.`); }
  }
  progressEl.style.display = 'none';
  renderStagedFiles();
}
function renderStagedFiles(){
  const el = document.getElementById('attach-staged');
  if(!el) return;
  el.innerHTML = stagedFiles.map(f => `
    <span class="attach-staged-chip">${f.type.startsWith('image/')?'🖼️':'📎'} ${escapeHtmlAttr(f.name)}<span class="rm" data-id="${f.id}">×</span></span>
  `).join('');
  el.querySelectorAll('.rm').forEach(rm=>{
    rm.addEventListener('click', ()=>{
      stagedFiles = stagedFiles.filter(f=>f.id !== rm.dataset.id);
      renderStagedFiles();
    });
  });
}

/* ===================== CHECKIN PANEL WIRING ===================== */
function buildCheckinGrid(){
  const grid = document.getElementById('checkin-grid');
  if(!grid) return;
  grid.innerHTML = CATEGORIES.map(c => `
    <div class="checkin-item">
      <div class="ci-label"><b><span class="ci-dot" style="background:${c.color}"></span>${c.label}</b><span id="ci-val-${c.id}" style="color:${c.color}">3</span></div>
      <input type="range" min="1" max="5" step="1" value="3" data-cat="${c.id}" style="accent-color:${c.color}"
             oninput="document.getElementById('ci-val-'+this.dataset.cat).textContent=this.value">
    </div>
  `).join('');
}

function wireCheckinPanel(){
  const panel = document.getElementById('panel');
  wireCardHandlers(panel);
  buildCheckinGrid();
  renderChart();
  renderSnapshot();

  document.getElementById('checkin-submit').addEventListener('click', async ()=>{
    const title = document.getElementById('checkin-title').value.trim() || '역량 체크인';
    const note = document.getElementById('checkin-note').value.trim();
    const scores = {};
    document.querySelectorAll('#checkin-grid input[type="range"]').forEach(inp=>{
      scores[inp.dataset.cat] = parseInt(inp.value);
    });
    entries.push({id:newId(), date:todayStr(), ts:Date.now(), type:'checkin', title, content:note, scores});
    await saveEntries();
    renderStats();
    renderSidebar();
    renderPanel();
  });
}

function renderChart(){
  const checkins = entries.filter(e=>e.type==='checkin').sort((a,b)=>a.ts-b.ts);
  const card = document.getElementById('chart-card');
  if(!card) return;
  if(checkins.length === 0){
    card.innerHTML = `<div class="chart-empty"><b>아직 역량 체크인이 없습니다</b>첫 체크인을 남기면 여기에 성장 곡선이 그려집니다.</div>`;
    return;
  }
  const w = 640, h = 160, padL = 30, padR = 20, padT = 16, padB = 26;
  const innerW = w - padL - padR, innerH = h - padT - padB;
  const n = checkins.length;
  const xFor = i => n===1 ? padL + innerW/2 : padL + (innerW * i/(n-1));
  const yFor = v => padT + innerH - ((v-1)/4)*innerH;
  const points = checkins.map((c,i)=>({x:xFor(i), y:yFor(avgScore(c.scores)), c}));
  const path = points.map((p,i)=> (i===0?'M':'L') + p.x.toFixed(1) + ' ' + p.y.toFixed(1)).join(' ');
  const gridLines = [1,2,3,4,5].map(v => `<line x1="${padL}" y1="${yFor(v)}" x2="${w-padR}" y2="${yFor(v)}" stroke="#EEF0F3" stroke-width="1"/><text x="${padL-8}" y="${yFor(v)+3}" font-size="9" fill="#9AA3B2" text-anchor="end" font-family="Pretendard">${v}</text>`).join('');
  const nodes = points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="4" fill="#FC9600" stroke="#fff" stroke-width="1.5"/>`).join('');
  const dateLabels = points.filter((_,i)=> i===0 || i===points.length-1).map(p=>
    `<text x="${p.x}" y="${h-6}" font-size="9" fill="#9AA3B2" text-anchor="${p===points[0]?'start':'end'}" font-family="Pretendard">${p.c.date}</text>`
  ).join('');
  card.innerHTML = `<svg id="chart-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      ${gridLines}
      <path d="${path}" fill="none" stroke="#FC9600" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      ${nodes}
      ${dateLabels}
    </svg>
    <div class="chart-legend">
      <span><span class="leg-dot" style="background:#FC9600"></span>평균 역량 점수 (1~5)</span>
      <span>체크인 ${n}회 · 최근: ${checkins[n-1].date}</span>
    </div>`;
}

function renderSnapshot(){
  const checkins = entries.filter(e=>e.type==='checkin').sort((a,b)=>b.ts-a.ts);
  const card = document.getElementById('snapshot-card');
  if(!card) return;
  if(checkins.length === 0){
    card.innerHTML = `<div class="chart-empty"><b>아직 스냅샷이 없습니다</b>역량 체크인을 남기면 카테고리별 강약점이 여기 표시됩니다.</div>`;
    return;
  }
  const latest = checkins[0];
  const minScore = Math.min(...CATEGORIES.map(c=>latest.scores[c.id] ?? 5));
  card.innerHTML = CATEGORIES.map(c=>{
    const v = latest.scores[c.id] || 0;
    const isWeak = v === minScore;
    return `<div class="snap-row ${isWeak?'weak':''}">
      <div class="snap-top"><b>${c.label}${isWeak?'<span class="weak-tag">⚠️ 가장 약한 영역</span>':''}</b><span style="color:${c.color}">${v} / 5</span></div>
      <div class="snap-track"><div class="snap-fill" style="width:${v/5*100}%; background:${c.color}"></div></div>
    </div>`;
  }).join('') + `<div class="chart-legend"><span>${latest.date} 기준 (${TYPE_LABEL.checkin} · ${latest.title})</span></div>`;
}

/* ===================== HERO STATS ===================== */
function renderStats(){
  document.getElementById('stat-total').textContent = entries.length;
  const checkins = entries.filter(e=>e.type==='checkin').sort((a,b)=>a.ts-b.ts);
  document.getElementById('stat-checkins').textContent = checkins.length;
  if(entries.length > 0){
    const earliest = Math.min(...entries.map(e=>e.ts));
    const days = Math.max(0, Math.floor((Date.now()-earliest)/86400000));
    document.getElementById('stat-days').innerHTML = days + '<span>일</span>';
  } else {
    document.getElementById('stat-days').innerHTML = '0<span>일</span>';
  }
  const growthEl = document.getElementById('stat-growth');
  if(checkins.length >= 2){
    const first = avgScore(checkins[0].scores);
    const last = avgScore(checkins[checkins.length-1].scores);
    const diff = (last-first).toFixed(1);
    growthEl.textContent = (diff>=0?'+':'') + diff;
  } else {
    growthEl.textContent = '–';
  }
}

/* ===================== FOOTER ACTIONS ===================== */
document.getElementById('reset-all').addEventListener('click', async ()=>{
  for(const id of Object.keys(attachmentCache)){
    await deleteAttachmentFile(id);
  }
  attachmentCache = {};
  entries = [];
  await saveEntries();
  renderStats();
  renderSidebar();
  renderPanel();
});
document.getElementById('load-example').addEventListener('click', async ()=>{
  const existingIds = new Set(entries.map(e=>e.id));
  EXAMPLE_ENTRIES.forEach(ex => { if(!existingIds.has(ex.id)) entries.push(ex); });
  await saveEntries();
  renderStats();
  renderSidebar();
  renderPanel();
});
document.getElementById('clear-example').addEventListener('click', async ()=>{
  entries = entries.filter(e => !e.isExample);
  await saveEntries();
  renderStats();
  renderSidebar();
  renderPanel();
});

/* ===================== BOOT ===================== */
let booted = false;
async function bootApp(){
  if(booted) return; // 재로그인 시 중복 초기화 방지
  booted = true;
  await loadEntries();
  await loadAttachmentCache();
  renderStats();
  renderSidebar();
  renderPanel();
}
</script>
