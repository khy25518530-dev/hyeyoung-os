<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>업무일지</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { box-sizing: border-box; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;
    color: #191F28;
    margin: 0;
    padding: 32px;
    background: #F2F4F6;
    -webkit-font-smoothing: antialiased;
  }

  .top-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    align-items: stretch;
  }
  .panel {
    background: #fff;
    border: none;
    border-radius: 20px;
    box-shadow: 0 1px 2px rgba(25,31,40,0.03), 0 4px 14px rgba(25,31,40,0.04);
    padding: 18px;
  }
  .mini-cal { width: 240px; flex-shrink: 0; }
  .mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .mini-cal-title { font-size: 14px; font-weight: 700; }
  .mini-nav-btn {
    border: none; background: #F2F4F6; color: #6B7684; font-size: 14px; cursor: pointer;
    width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s ease;
  }
  .mini-nav-btn:hover { background: #E8EBED; color: #191F28; }
  .nav-btn-lg {
    border: none; background: #fff; color: #6B7684; font-size: 18px; cursor: pointer;
    width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 2px rgba(25,31,40,0.03), 0 2px 8px rgba(25,31,40,0.04);
    transition: background 0.15s ease, color 0.15s ease;
  }
  .fixed-toolbar {
    display: flex; align-items: center; gap: 6px; background: #fff; padding: 8px 12px;
    border-radius: 12px; box-shadow: 0 1px 2px rgba(25,31,40,0.03), 0 2px 8px rgba(25,31,40,0.04);
  }
  .nav-btn-lg:hover { background: #FFF4E6; color: #FC9600; }
  .mini-weekday-row { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; }
  .mini-weekday-cell { text-align: center; font-size: 10px; color: #B0B8C1; font-weight: 700; }
  .mini-weekday-cell.sun { color: #F04452; }
  .mini-weekday-cell.sat { color: #3182F6; }
  .mini-day-grid { display: grid; grid-template-columns: repeat(7, 1fr); row-gap: 2px; }
  .mini-day-cell {
    text-align: center; font-size: 12px; color: #191F28;
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; margin: 0 auto; width: 26px;
  }
  .mini-day-cell.out { color: #D5D9DE; }
  .mini-day-cell.today { background: #FC9600; color: #fff; font-weight: 700; }
  .mini-day-cell.sun { color: #F04452; }
  .mini-day-cell.sat { color: #3182F6; }
  .mini-day-cell.out.sun, .mini-day-cell.out.sat { color: #F4D9DA; }

  .memo-grid-wrap {
    flex: 1;
    min-width: 320px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    align-items: stretch;
  }
  .memo-box { min-width: 0; }
  .memo-label { font-size: 12px; font-weight: 700; color: #8B95A1; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .memo-title-input {
    border: none; outline: none; background: transparent; font-size: 12px; font-weight: 700;
    color: #8B95A1; font-family: inherit; flex: 1; min-width: 0; padding: 2px 0; border-radius: 4px;
  }
  .memo-title-input:hover, .memo-title-input:focus { background: #F2F4F6; color: #191F28; padding: 2px 4px; }
  .memo-box textarea {
    width: 100%; min-height: 140px; border: none; outline: none; resize: none; overflow: hidden;
    font-size: 13px; line-height: 1.7; font-family: inherit; color: #191F28;
  }
  .add-memo-btn {
    min-height: 60px; cursor: pointer;
    border: none; background: #fff; color: #8B95A1; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .add-memo-btn:hover { color: #FC9600; }
  .delete-memo-btn { border: none; background: none; color: #C3C9CF; cursor: pointer; font-size: 12px; padding: 0; }
  .delete-memo-btn:hover { color: #F04452; }

  .todo-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; min-width: 0; cursor: grab; border-radius: 8px; padding: 2px 4px; margin-left: -4px; transition: background 0.12s ease, opacity 0.12s ease; }
  .todo-row:hover { background: #F7F8FA; }
  .todo-row.dragging { opacity: 0.35; }
  .day-cell.drop-hover { background: #FFF4E6 !important; box-shadow: inset 0 0 0 2px #FC9600; }
  .todo-text { font-size: 13px; flex: 1; min-width: 0; word-break: break-word; white-space: pre-wrap; line-height: 1.6; padding-top: 1px; }
  .todo-text.done { text-decoration: line-through; color: #B0B8C1; }
  .icon-btn { border: none; background: none; cursor: pointer; padding: 0; flex-shrink: 0; font-size: 12px; color: #C3C9CF; transition: color 0.15s ease; }
  .icon-btn:hover { color: #6B7684; }
  .rollover-btn { color: #FC9600; font-size: 14px; }
  .rollover-btn:hover { color: #E08600; }
  .edit-wrap { flex: 1; min-width: 0; }
  .rich-edit {
    font-size: 13px; line-height: 1.6; color: #191F28; outline: none;
    background: #F9FAFB; border-radius: 6px; padding: 2px 6px; box-shadow: 0 0 0 2px #FFD9A0;
    min-height: 20px; word-break: break-word;
  }
  .edit-toolbar { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .toolbar-btn {
    width: 26px; height: 26px; border-radius: 6px; border: 1px solid #E5E8EB; background: #fff;
    font-size: 12px; cursor: pointer; color: #191F28;
  }
  .toolbar-btn:hover { background: #F2F4F6; }
  .toolbar-sep { width: 1px; height: 16px; background: #E5E8EB; margin: 0 2px; }
  .color-swatch {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff;
    box-shadow: 0 0 0 1px #E5E8EB; cursor: pointer; padding: 0; flex-shrink: 0;
  }
  .color-swatch:hover { box-shadow: 0 0 0 2px #FC9600; }
  .color-swatch-reset {
    background: #fff; color: #C3C9CF; font-size: 10px; display: flex; align-items: center; justify-content: center;
  }
  .todo-edit-input {
    flex: 1; min-width: 0; font-size: 13px; font-family: inherit; color: #191F28;
    border: none; outline: none; resize: none; overflow: hidden; background: #F9FAFB;
    border-radius: 6px; padding: 1px 4px; line-height: 1.6; box-shadow: 0 0 0 2px #FFD9A0;
  }
  select.cat-select {
    border: none; background: #F2F4F6; border-radius: 6px; font-size: 10px; color: #6B7684;
    padding: 4px 4px; flex-shrink: 0; width: 52px; cursor: pointer;
  }
  input.move-date {
    border: none; background: #F2F4F6; border-radius: 6px; font-size: 10px; color: #6B7684;
    padding: 2px 4px; flex-shrink: 0; width: 84px; cursor: pointer;
  }

  input[type="checkbox"] {
    accent-color: #FC9600;
    width: 18px; height: 18px;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
  }

  input.boxed, textarea.boxed {
    border: none; border-radius: 10px; padding: 8px 10px; background: transparent;
    margin-top: 6px; width: 100%; outline: none; font-size: 13px; font-family: inherit;
    color: #191F28; transition: box-shadow 0.15s ease, background 0.15s ease;
  }
  input.boxed::placeholder, textarea.boxed::placeholder { color: #C3C9CF; }
  input.boxed:hover, textarea.boxed:hover { background: #F9FAFB; }
  input.boxed:focus, textarea.boxed:focus { background: #fff; box-shadow: 0 0 0 2px #FFD9A0; }

  .journal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .title { font-size: 20px; font-weight: 700; }
  .subtitle { font-size: 12px; color: #8B95A1; margin-top: 4px; }
  .btn {
    padding: 10px 16px; border-radius: 12px; border: none; background: #FC9600; color: #fff;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: transform 0.1s ease, opacity 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn.ghost { background: #fff; color: #6B7684; box-shadow: 0 1px 2px rgba(25,31,40,0.03), 0 2px 8px rgba(25,31,40,0.04); }
  .btn.ghost:hover { color: #191F28; }
  .error {
    color: #F04452; font-size: 12px; margin-bottom: 12px; background: #FFEDEE;
    padding: 10px 14px; border-radius: 10px;
  }

  .table-wrap {
    background: #fff; border-radius: 20px; overflow: hidden;
    box-shadow: 0 1px 2px rgba(25,31,40,0.03), 0 4px 14px rgba(25,31,40,0.04);
    overflow-x: auto; flex: 1; min-width: 0;
  }
  .grid { display: grid; align-items: stretch; }
  .cell { border-right: 1px solid #F2F4F6; border-bottom: 1px solid #F2F4F6; padding: 12px 14px; overflow: hidden; min-width: 0; }
  .journal-grid textarea {
    width: 100%; border: none; outline: none; resize: none; overflow: hidden;
    font-size: 13px; color: #191F28; font-family: inherit; background: transparent; line-height: 1.7; display: block;
  }
  .week-label { font-size: 14px; font-weight: 700; }
  .progress-badge {
    font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    padding: 3px 9px; border-radius: 100px; background: #FFF4E6;
  }
  .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .day-date-label { font-size: 12px; color: #8B95A1; font-weight: 500; }
  .day-date-label.today { color: #FC9600; font-weight: 700; }
</style>
</head>
<body>

<div class="top-row">
  <div class="panel mini-cal">
    <div class="mini-cal-header">
      <button class="mini-nav-btn" onclick="MiniCal.prevMonth()">‹</button>
      <div class="mini-cal-title" id="miniCalTitle"></div>
      <button class="mini-nav-btn" onclick="MiniCal.nextMonth()">›</button>
    </div>
    <div class="mini-weekday-row">
      <div class="mini-weekday-cell sun">일</div>
      <div class="mini-weekday-cell">월</div>
      <div class="mini-weekday-cell">화</div>
      <div class="mini-weekday-cell">수</div>
      <div class="mini-weekday-cell">목</div>
      <div class="mini-weekday-cell">금</div>
      <div class="mini-weekday-cell sat">토</div>
    </div>
    <div class="mini-day-grid" id="miniDayGrid"></div>
  </div>

  <div class="memo-grid-wrap">
    <div id="memoRow" style="display:contents;"></div>
    <button class="panel add-memo-btn" onclick="QuickMemos.addMemo()">+ 메모 추가</button>
  </div>
</div>

<div class="journal-header">
  <div>
    <div class="title" id="journalTitle">업무일지</div>
    <div class="subtitle">할 일을 더블클릭해서 편집하고, 드래그로 선택한 뒤 아래 툴바로 서식을 적용하세요</div>
  </div>
  <div style="display:flex; gap:14px; align-items:center;">
    <div class="fixed-toolbar" id="fixedToolbar">
      <button type="button" class="toolbar-btn" data-cmd="bold"><b>B</b></button>
      <button type="button" class="toolbar-btn" data-cmd="italic"><i>I</i></button>
      <span class="toolbar-sep"></span>
      <button type="button" class="color-swatch" data-color="#FC9600" style="background:#FC9600;"></button>
      <button type="button" class="color-swatch" data-color="#3182F6" style="background:#3182F6;"></button>
      <button type="button" class="color-swatch" data-color="#00C896" style="background:#00C896;"></button>
      <button type="button" class="color-swatch" data-color="#F04452" style="background:#F04452;"></button>
      <button type="button" class="color-swatch" data-color="#7C6FE8" style="background:#7C6FE8;"></button>
      <button type="button" class="color-swatch" data-color="#191F28" style="background:#191F28;"></button>
      <button type="button" class="color-swatch color-swatch-reset" data-color="reset" title="기본색">✕</button>
    </div>
    <div style="display:flex; gap:6px;">
      <button class="nav-btn-lg" onclick="MiniCal.prevMonth()">‹</button>
      <button class="nav-btn-lg" onclick="MiniCal.nextMonth()">›</button>
    </div>
  </div>
</div>

<div id="journalError" class="error" style="display:none;"></div>

<div style="display:flex; gap:16px; align-items:flex-start;">
  <div class="table-wrap">
    <div id="grid" class="grid journal-grid"></div>
  </div>
</div>

<script>
function pad(n) { return String(n).padStart(2, "0"); }
function toDateStr(y, m, d) { return `${y}-${pad(m + 1)}-${pad(d)}`; }
function todayStr() {
  const d = new Date();
  return toDateStr(d.getFullYear(), d.getMonth(), d.getDate());
}
function toMD(dateStr) {
  const d = new Date(dateStr);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}
function escapeHtml(str) {
  return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
let idCounter = 0;
function newId() { idCounter += 1; return `${Date.now()}_${idCounter}`; }

/* ============================================================
   MiniCal — month navigator (drives Journal's visible weeks)
   ============================================================ */
const MiniCal = {
  viewYear: 0,
  viewMonth: 0,
  today: todayStr(),

  init() {
    const now = new Date();
    this.viewYear = now.getFullYear();
    this.viewMonth = now.getMonth();
    this.render();
  },
  prevMonth() {
    this.viewMonth -= 1;
    if (this.viewMonth < 0) { this.viewMonth = 11; this.viewYear -= 1; }
    this.render();
    if (typeof Journal !== "undefined") Journal.render();
    if (typeof QuickMemos !== "undefined") QuickMemos.loadMonth();
  },
  nextMonth() {
    this.viewMonth += 1;
    if (this.viewMonth > 11) { this.viewMonth = 0; this.viewYear += 1; }
    this.render();
    if (typeof Journal !== "undefined") Journal.render();
    if (typeof QuickMemos !== "undefined") QuickMemos.loadMonth();
  },
  render() {
    document.getElementById("miniCalTitle").textContent = `${this.viewYear}.${pad(this.viewMonth + 1)}`;
    const firstDay = new Date(this.viewYear, this.viewMonth, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(this.viewYear, this.viewMonth + 1, 0).getDate();
    const daysInPrevMonth = new Date(this.viewYear, this.viewMonth, 0).getDate();

    const cells = [];
    for (let i = startWeekday - 1; i >= 0; i--) cells.push({ day: daysInPrevMonth - i, inMonth: false, dow: null });
    for (let d = 1; d <= daysInMonth; d++) {
      const dow = new Date(this.viewYear, this.viewMonth, d).getDay();
      cells.push({ day: d, inMonth: true, dow, date: toDateStr(this.viewYear, this.viewMonth, d) });
    }
    let nextDay = 1;
    while (cells.length % 7 !== 0) { cells.push({ day: nextDay, inMonth: false, dow: null }); nextDay += 1; }

    let html = "";
    cells.forEach((cell) => {
      const isToday = cell.date === this.today;
      const dowClass = cell.dow === 0 ? "sun" : cell.dow === 6 ? "sat" : "";
      html += `<div class="mini-day-cell ${cell.inMonth ? "" : "out"} ${isToday ? "today" : dowClass}">${cell.day}</div>`;
    });
    document.getElementById("miniDayGrid").innerHTML = html;
  },
};

/* ============================================================
   Quick memos — 3 independent freeform notepads
   ============================================================ */
const QuickMemos = {
  memos: [],
  saveTimer: null,
  loadToken: 0,

  keyForCurrentMonth() {
    return `quick-memos:${MiniCal.viewYear}-${pad(MiniCal.viewMonth + 1)}`;
  },

  async init() {
    await this.loadMonth();
  },
  async loadMonth() {
    const myToken = ++this.loadToken;
    const key = this.keyForCurrentMonth();
    let loaded = [];
    try {
      const result = await window.storage.get(key, false);
      if (result && result.value) {
        const parsed = JSON.parse(result.value);
        if (Array.isArray(parsed)) loaded = parsed;
      }
    } catch (e) {}
    if (myToken !== this.loadToken) return; // a newer month load started while this was in flight
    if (loaded.length === 0) {
      loaded = [{ id: newId(), title: "메모", text: "" }, { id: newId(), title: "메모", text: "" }];
    }
    this.memos = loaded;
    this.render();
  },
  addMemo() {
    this.memos.push({ id: newId(), title: "메모", text: "" });
    this.render();
    this.persist();
  },
  deleteMemo(id) {
    this.memos = this.memos.filter((m) => m.id !== id);
    this.render();
    this.persist();
  },
  updateMemo(id, text) {
    const m = this.memos.find((x) => x.id === id);
    if (m) m.text = text;
    this.scheduleSave();
  },
  updateMemoTitle(id, title) {
    const m = this.memos.find((x) => x.id === id);
    if (m) m.title = title;
    this.scheduleSave();
  },
  autoSize(el) { el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; },
  scheduleSave() { clearTimeout(this.saveTimer); this.saveTimer = setTimeout(() => this.persist(), 500); },
  async persist() {
    try { await window.storage.set(this.keyForCurrentMonth(), JSON.stringify(this.memos), false); } catch (e) {}
  },

  render() {
    const row = document.getElementById("memoRow");
    let html = "";
    this.memos.forEach((m) => {
      html += `<div class="panel memo-box">`;
      html += `<div class="memo-label"><input type="text" class="memo-title-input" value="${escapeHtml(m.title || "메모")}" oninput="QuickMemos.updateMemoTitle('${m.id}', this.value)" /><button class="delete-memo-btn" onclick="QuickMemos.deleteMemo('${m.id}')">✕</button></div>`;
      html += `<textarea id="memo-${m.id}" placeholder="적어두고 싶은 것">${escapeHtml(m.text)}</textarea>`;
      html += `</div>`;
    });
    row.innerHTML = html;
    this.memos.forEach((m) => {
      const el = document.getElementById(`memo-${m.id}`);
      this.autoSize(el);
      el.oninput = () => { this.updateMemo(m.id, el.value); this.autoSize(el); };
    });
  },
};

/* ============================================================
   Journal — weeks auto-generated from the month shown in MiniCal
   ============================================================ */
const JOURNAL_STORAGE_KEY = "monthly-auto-journal:data";
let journalSaveTimer = null;
function scheduleJournalSave() { clearTimeout(journalSaveTimer); journalSaveTimer = setTimeout(() => Journal.persist(), 500); }

function mondayOf(dateStr) {
  const d = new Date(dateStr);
  const dow = d.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + diff);
  return toDateStr(d.getFullYear(), d.getMonth(), d.getDate());
}

const COLOR_PALETTE = ["#FC9600", "#3182F6", "#00C896", "#F04452", "#7C6FE8", "#191F28"];

function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return toDateStr(d.getFullYear(), d.getMonth(), d.getDate());
}

function computeMonthWeeks(year, month) {
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstMonday = mondayOf(toDateStr(year, month, 1));
  const lastMonday = mondayOf(toDateStr(year, month, daysInMonth));

  const weeks = [];
  let cursor = firstMonday;
  while (true) {
    const dates = [];
    for (let i = 0; i < 5; i++) dates.push(addDays(cursor, i));
    weeks.push({ key: cursor, dates });
    if (cursor === lastMonday) break;
    cursor = addDays(cursor, 7);
  }
  weeks.forEach((w, idx) => { w.label = `${idx + 1}주차`; });
  return weeks;
}

const Journal = {
  todos: [],          // { id, text, done, date: 'YYYY-MM-DD' | null }
  weekMemos: {},       // { weekKey: text }
  today: todayStr(),

  async init() {
    try {
      const result = await window.storage.get(JOURNAL_STORAGE_KEY, false);
      if (result && result.value) {
        const data = JSON.parse(result.value);
        this.todos = data.todos || [];
        this.weekMemos = data.weekMemos || {};
      }
    } catch (e) {}
    this.render();
  },
  showError(msg) {
    const el = document.getElementById("journalError");
    if (msg) { el.style.display = "block"; el.textContent = msg; } else el.style.display = "none";
  },
  async persist() {
    try {
      const result = await window.storage.set(JOURNAL_STORAGE_KEY, JSON.stringify({ todos: this.todos, weekMemos: this.weekMemos }), false);
      if (!result) this.showError("저장에 실패했습니다.");
      else this.showError("");
    } catch (e) { this.showError("저장에 실패했습니다."); }
  },
  reset() {
    const weeks = computeMonthWeeks(MiniCal.viewYear, MiniCal.viewMonth);
    const monthDates = new Set(weeks.flatMap((w) => w.dates.filter(Boolean)));
    this.todos = this.todos.filter((t) => !(t.date && monthDates.has(t.date)));
    weeks.forEach((w) => delete this.weekMemos[w.key]);
    this.render();
    this.persist();
  },
  addTodoFromInput(date, inputId, category) {
    const input = document.getElementById(inputId);
    const text = input ? input.value.trim() : "";
    if (!text) return;
    this.todos.push({ id: newId(), text, done: false, date, category: category || "work" });
    this.render();
    this.persist();
  },
  toggleTodo(id) {
    const t = this.todos.find((x) => x.id === id);
    if (t) t.done = !t.done;
    this.render();
    this.persist();
  },
  deleteTodo(id) {
    this.todos = this.todos.filter((t) => t.id !== id);
    this.render();
    this.persist();
  },
  setTodoDate(id, date) {
    const t = this.todos.find((x) => x.id === id);
    if (t) t.date = date || null;
    this.render();
    this.persist();
  },
  rollover(id) {
    const t = this.todos.find((x) => x.id === id);
    if (t && t.date) {
      const d = new Date(t.date);
      d.setDate(d.getDate() + 1);
      t.date = toDateStr(d.getFullYear(), d.getMonth(), d.getDate());
      this.render();
      this.persist();
    }
  },
  updateWeekMemo(weekKey, text) {
    this.weekMemos[weekKey] = text;
    scheduleJournalSave();
  },
  updateTodoHtml(id, html) {
    const t = this.todos.find((x) => x.id === id);
    if (t) t.html = html;
    this.render();
    this.persist();
  },
  startEdit(spanEl, id) {
    const t = this.todos.find((x) => x.id === id);
    if (!t) return;

    const editable = document.createElement("div");
    editable.className = "rich-edit";
    editable.contentEditable = "true";
    editable.innerHTML = t.html || escapeHtml(t.text);

    spanEl.replaceWith(editable);
    editable.focus();
    Journal.activeEditable = editable;

    const rowEl = editable.closest(".todo-row");
    if (rowEl) rowEl.draggable = false;

    // place cursor at end
    const range = document.createRange();
    range.selectNodeContents(editable);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    let committed = false;
    const commit = () => {
      if (committed) return;
      committed = true;
      if (Journal.activeEditable === editable) Journal.activeEditable = null;
      Journal.updateTodoHtml(id, editable.innerHTML);
    };
    editable.addEventListener("blur", () => {
      // slight delay so a fixed-toolbar mousedown (which prevents default) doesn't get treated as "click outside"
      setTimeout(() => {
        if (document.activeElement !== editable) commit();
      }, 0);
    });
    editable.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
        e.preventDefault();
        editable.blur();
      }
      if (e.key === "Escape") {
        committed = true;
        Journal.render();
      }
    });
  },

  render() {
    document.getElementById("journalTitle").textContent = `${MiniCal.viewMonth + 1}월 업무일지`;

    const weeks = computeMonthWeeks(MiniCal.viewYear, MiniCal.viewMonth);
    const WEEKDAY_LABELS = ["월", "화", "수", "목", "금"];
    const maxDates = 5;
    const ROW_HEADER = 1;
    const ROW_DATE_START = 2;
    const ROW_MEMO = ROW_DATE_START + maxDates;

    const grid = document.getElementById("grid");
    grid.style.gridTemplateColumns = `70px repeat(${weeks.length}, minmax(200px, 1fr))`;
    grid.style.gridTemplateRows = `40px repeat(${maxDates}, minmax(48px, auto)) minmax(110px, auto)`;

    let html = "";
    html += `<div class="cell" style="grid-column:1;grid-row:${ROW_HEADER};background:#F7F8FA;"></div>`;
    for (let i = 0; i < maxDates; i++) {
      html += `<div class="cell" style="grid-column:1;grid-row:${ROW_DATE_START + i};background:#F7F8FA;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#8B95A1;">${WEEKDAY_LABELS[i]}</div>`;
    }
    html += `<div class="cell" style="grid-column:1;grid-row:${ROW_MEMO};background:#F5F3FF;color:#7C6FE8;font-size:12px;font-weight:700;padding-top:10px;border-bottom:none;">메모</div>`;

    weeks.forEach((week, wi) => {
      const col = wi + 2;
      const weekTodos = this.todos.filter((t) => t.date && week.dates.includes(t.date));
      const total = weekTodos.length;
      const doneCount = weekTodos.filter((t) => t.done).length;
      const pct = total ? Math.round((doneCount / total) * 100) : 0;

      html += `<div class="cell" style="grid-column:${col};grid-row:${ROW_HEADER};display:flex;align-items:center;justify-content:space-between;background:#F7F8FA;">`;
      html += `<span class="week-label">${week.label}</span>`;
      if (total > 0) html += `<span class="progress-badge" style="color:${pct === 100 ? "#1F9254" : "#FC9600"};">${doneCount}/${total} · ${pct}%</span>`;
      html += `</div>`;

      for (let i = 0; i < maxDates; i++) {
        const date = week.dates[i];
        if (!date) { html += `<div class="cell" style="grid-column:${col};grid-row:${ROW_DATE_START + i};"></div>`; continue; }
        const items = this.todos.filter((t) => t.date === date);
        const isToday = date === this.today;
        const dObj = new Date(date);
        const inMonth = dObj.getFullYear() === MiniCal.viewYear && dObj.getMonth() === MiniCal.viewMonth;
        html += `<div class="cell day-cell" style="grid-column:${col};grid-row:${ROW_DATE_START + i};background:${isToday ? "#FFF4E6" : inMonth ? "#fff" : "#FAFAFB"};" ondragover="event.preventDefault(); event.currentTarget.classList.add('drop-hover');" ondragleave="event.currentTarget.classList.remove('drop-hover');" ondrop="event.preventDefault(); event.currentTarget.classList.remove('drop-hover'); Journal.setTodoDate(event.dataTransfer.getData('text/plain'), '${date}');">`;
        html += `<div class="day-header"><span class="day-date-label ${isToday ? "today" : ""}" style="${inMonth ? "" : "color:#C3C9CF;"}">${toMD(date)}</span></div>`;
        items.forEach((t) => { html += renderTodoItem(t); });
        const dayInputId = `day-input-${date}`;
        html += `<textarea id="${dayInputId}" class="boxed" rows="1" placeholder="" oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px';" onkeydown="if(event.key==='Enter' && !event.shiftKey && !event.isComposing && event.keyCode !== 229){event.preventDefault(); Journal.addTodoFromInput('${date}', '${dayInputId}'); this.value=''; this.style.height='auto';}"></textarea>`;
        html += `</div>`;
      }

      const memoId = `week-memo-${week.key}`;
      html += `<div class="cell" style="grid-column:${col};grid-row:${ROW_MEMO};background:#F5F3FF;border-bottom:none;">`;
      html += `<textarea id="${memoId}" placeholder="메모" rows="4" style="min-height:90px;" oninput="Journal.updateWeekMemo('${week.key}', this.value); this.style.height='auto'; this.style.height=this.scrollHeight+'px';">${escapeHtml(this.weekMemos[week.key] || "")}</textarea>`;
      html += `</div>`;
    });

    grid.innerHTML = html;
    weeks.forEach((week) => {
      const el = document.getElementById(`week-memo-${week.key}`);
      if (el) { el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; }
    });

    function renderTodoItem(todo) {
      const content = todo.html || escapeHtml(todo.text);
      let row = `<div class="todo-row" draggable="true" ondragstart="event.dataTransfer.setData('text/plain', '${todo.id}'); event.currentTarget.classList.add('dragging');" ondragend="event.currentTarget.classList.remove('dragging');">`;
      row += `<input type="checkbox" ${todo.done ? "checked" : ""} onchange="Journal.toggleTodo('${todo.id}')" style="margin-top:2px;flex-shrink:0;cursor:pointer;" />`;
      row += `<span class="todo-text ${todo.done ? "done" : ""}" title="더블클릭: 수정" ondblclick="Journal.startEdit(this, '${todo.id}')">${content}</span>`;
      row += `<button class="icon-btn" onclick="Journal.deleteTodo('${todo.id}')">✕</button>`;
      row += `</div>`;
      return row;
    }
  },
};

document.querySelectorAll("#fixedToolbar button").forEach((btn) => {
  // mousedown+preventDefault keeps whatever text selection/focus is active (avoids blur before the command runs)
  btn.addEventListener("mousedown", (e) => {
    e.preventDefault();
    const cmd = btn.dataset.cmd;
    const color = btn.dataset.color;
    try {
      if (cmd) document.execCommand(cmd, false, null);
      else if (color === "reset") document.execCommand("foreColor", false, "#191F28");
      else if (color) document.execCommand("foreColor", false, color);
    } catch (err) {}
  });
});

window.startApp = function () {
  MiniCal.init();
  QuickMemos.init();
  Journal.init();
};
</script>

<script type="module">
  // ---- hyeyoung-os Firebase 연동 ----
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc,
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
  import {
    getAuth, signInAnonymously, onAuthStateChanged,
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD1e1RuI7PGWWahCeyxJ_rny4LKf18mLn8",
    authDomain: "hyeyoung-os.firebaseapp.com",
    databaseURL: "https://hyeyoung-os-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "hyeyoung-os",
    storageBucket: "hyeyoung-os.firebasestorage.app",
    messagingSenderId: "1096722918453",
    appId: "1:1096722918453:web:8e116c5f583431a095157c",
    measurementId: "G-XVSTQPLZR1",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // 업무일지 전용 컬렉션. 기존 hyeyoung-os 데이터(학습영역, 역량체크인 등)와 섞이지 않게 분리.
  const COLLECTION = "worklog";

  // 기존 코드가 쓰던 window.storage.get/set(key, value, shared) 형태를 그대로 흉내내서
  // 원래 로직(App/MiniCal/QuickMemos/Journal)은 한 줄도 안 건드리고 저장소만 Firestore로 교체.
  window.storage = {
    async get(key) {
      const snap = await getDoc(doc(db, COLLECTION, key));
      if (!snap.exists()) return null;
      const data = snap.data();
      return { key, value: data.value, shared: false };
    },
    async set(key, value) {
      await setDoc(doc(db, COLLECTION, key), { value, updatedAt: Date.now() });
      return { key, value, shared: false };
    },
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.startApp();
    }
  });
  signInAnonymously(auth).catch((err) => {
    console.error("Firebase 인증 실패:", err);
    // 인증이 안 되더라도 화면은 뜨게 (저장은 실패로 표시됨)
    window.startApp();
  });
</script>
